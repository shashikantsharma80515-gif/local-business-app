<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Business</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#0d6efd;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:15px;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:8px;
background:#0d6efd;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

label{
font-weight:bold;
margin-top:15px;
display:block;
}

img{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<header>

<h1>➕ Add New Business</h1>

<p>Fill Business Details</p>

</header>

<div class="container">

<input
type="text"
id="businessName"
placeholder="🏪 Business Name">

<input
type="text"
id="ownerName"
placeholder="👤 Owner Name">

<input
type="tel"
id="phone"
placeholder="📞 Phone Number">

<input
type="email"
id="email"
placeholder="📧 Email Address">

<input
type="text"
id="address"
placeholder="📍 Address">

<input
type="url"
id="mapLink"
placeholder="🗺️ Google Maps Link">

<input
type="url"
id="website"
placeholder="🌐 Website (Optional)">

<select id="category">

<option>Medical</option>
<option>Grocery</option>
<option>Restaurant</option>
<option>Salon</option>
<option>Mobile Repair</option>
<option>Hotel</option>
<option>School</option>
<option>Electronics</option>
<option>Clothing</option>

</select>

<textarea
id="description"
placeholder="📝 Business Description"></textarea>

<label>📷 Business Photo</label>

<input
type="file"
id="businessImage"
accept="image/*">

<img id="preview">

<button id="addBtn">
➕ Add Business
</button>

</div>

<script>
const fileInput=document.getElementById("businessImage");
const preview=document.getElementById("preview");

fileInput.addEventListener("change",function(){

const file=this.files[0];

if(file){

preview.src=URL.createObjectURL(file);

preview.style.display="block";

}

});
</script>

<script type="module" src="add-business.js"></script>

</body>

</html>
