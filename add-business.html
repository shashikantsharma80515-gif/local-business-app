<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Business</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

label{
    font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>➕ Add New Business</h1>
</header>

<div class="container">

<input type="text" id="businessName" placeholder="🏪 Business Name">

<input type="text" id="ownerName" placeholder="👤 Owner Name">

<input type="tel" id="phone" placeholder="📞 Phone Number">

<input type="text" id="address" placeholder="📍 Address">

<select id="category">
    <option>Medical</option>
    <option>Grocery</option>
    <option>Restaurant</option>
    <option>Salon</option>
    <option>Mobile Repair</option>
</select>

<br><br>

<label>📷 Business Photo</label>

<input type="file" id="photo" accept="image/*">

<button id="addBtn">
➕ Add Business
</button>

</div>

<script src="add-business.js"></script>

<script>
document.getElementById("addBtn").addEventListener("click", saveBusiness);
</script>

</body>
</html>
