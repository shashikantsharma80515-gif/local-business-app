<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

#stats{
    margin-bottom:20px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "admin.html";
}

function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "admin.html";
}
</script>

</head>

<body>

<header>
<h1>📍 Sarmera Business Hub</h1>
<p>Admin Dashboard</p>
</header>

<div class="card">

<h2>Welcome Admin 👋</h2>

<div id="stats"></div>

<button onclick="window.location.href='all-businesses.html'">
📋 All Businesses
</button>

<button onclick="window.location.href='all-businesses.html'">
✅ Approve Business
</button>

<button onclick="window.location.href='all-businesses.html'">
❌ Reject Business
</button>

<button onclick="window.location.href='add-business.html'">
➕ Add Business
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<script src="dashboard.js"></script>

</body>
</html>
