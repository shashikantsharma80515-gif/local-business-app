<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
}

.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "admin.html";
}
</script>

<header>
<h1>Admin Dashboard</h1>
</header>

<div class="card">

<h2>Welcome Admin 👋</h2>

<button>📋 All Businesses</button>

<button>✅ Approve Business</button>

<button>❌ Reject Business</button>

<button onclick="window.location.href='add-business.html'">
➕ Add Business
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<script>
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href="admin.html";
}
</script>

</body>
</html>
