<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sarmera Business Hub</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.search{
    padding:15px;
}

#search{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

#businessList{
    padding:15px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

</style>

</head>

<body>

<header>

<h1>📍 Sarmera Business Hub</h1>

<p>Find Local Businesses Near You</p>

</header>

<div style="text-align:center;padding:15px;">

<a href="admin.html">
<button>🔐 Admin Login</button>
</a>

</div>

<div class="search">

<input
type="text"
id="search"
placeholder="🔍 Search Business...">

</div>

<h2 style="padding:15px;">
📋 Approved Businesses
</h2>

<div id="businessList"></div>

<script type="module" src="script.js"></script>

</body>

</html>
