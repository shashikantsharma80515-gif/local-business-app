<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarmera Business Hub</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
}

.search{
padding:15px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.business{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
margin-right:8px;
}
</style>

</head>

<body>

<header>
<h1>📍 Sarmera Business Hub</h1>
<p>Find Local Businesses Near You</p>
</header>

<div class="search">
<input type="text" placeholder="Search Business...">
</div>

<div class="categories">
<div class="box">🛒 Grocery</div>
<div class="box">💊 Medical</div>
<div class="box">🍽 Restaurant</div>
<div class="box">💇 Salon</div>
<div class="box">📱 Mobile Repair</div>
<div class="box">🔧 Hardware</div>
</div>

<div class="business">
<h3>Gupta Medical</h3>
<p>📍 Sarmera Bazaar</p>
<button>📞 Call</button>
<button>💬 WhatsApp</button>
</div>

<div class="business">
<h3>Raju Kirana Store</h3>
<p>📍 Main Road, Sarmera</p>
<button>📞 Call</button>
<button>💬 WhatsApp</button>
</div>
<script src="script.js"></script>
</body>
  </html>
