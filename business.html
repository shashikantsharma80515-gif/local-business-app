<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Details</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

#businessDetails{
    max-width:600px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h2{
    margin-top:0;
    color:#0d6efd;
}

.card p{
    margin:12px 0;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.back{
    background:#6c757d;
}

</style>

</head>

<body>

<header>

<h1>🏪 Business Details</h1>

</header>

<div id="businessDetails">

<h3 style="text-align:center;">Loading...</h3>

</div>

<script type="module" src="business.js"></script>

</body>

</html>
